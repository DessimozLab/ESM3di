name: esm3di
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
  - bioconda
dependencies:
  - python=3.10
  - pip
  # PyTorch with CUDA support (adjust cuda version as needed)
  - pytorch>=2.0.0
  - pytorch-cuda=11.8
  - cudatoolkit=11.8
  - foldseek
  # Pip dependencies
  - pip:
      - transformers>=4.30.0,<4.48.2  # Compatible with esm 3.2.1.post1
      - peft>=0.5.0,<0.13.0  # Compatible with transformers <4.48.2
      - accelerate>=0.20.0
      - sentencepiece  # for ESM tokenizer
      - protobuf
      - pandas
      - pebble
      - tensorboard
      - biopython
      - esm
      - httpx
      - flash-attn
      - -e .  # Install package in editable mode
