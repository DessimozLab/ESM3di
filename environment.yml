name: esm3di
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
  - bioconda
dependencies:
  - python=3.10
  - pip
  # PyTorch with CUDA support (adjust cuda version as needed)
  - pytorch>=2.0.0
  - pytorch-cuda=11.8
  - cudatoolkit=11.8
  - foldseek
  # Pip dependencies
  - pip:
      - transformers>=4.46.0,<4.48.2
      - peft>=0.10.0,<0.12.0
      - accelerate>=0.20.0
      - numpy==1.26.4
      - scipy==1.13.1
      - sentencepiece  # for ESM tokenizer
      - protobuf
      - pandas
      - pebble
      - tensorboard
      - esm
      - -e .  # Install package in editable mode
