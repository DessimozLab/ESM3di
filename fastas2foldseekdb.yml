name: fastas2foldseekdb
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pip
  - pytorch>=2.0.0
  - pytorch-cuda=11.8
  - cudatoolkit=11.8
  - foldseek
  - numpy
  - pip:
      - transformers>=4.30.0,<4.48.2
      - peft>=0.5.0,<0.13.0
      - accelerate>=0.20.0
      - sentencepiece
      - protobuf
      - pandas
      - biopython
      - bitsandbytes
      - einops
      - trifast
      - -e .
